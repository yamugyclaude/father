name: 💊 약 알람 발송

on:
  schedule:
    # 매 15분마다 실행 (KST 기준으로 alarm.js 안에서 시간 변환)
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:   # 수동 테스트용

permissions:
  contents: read

jobs:
  send-alarm:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 코드 받기
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm install

      - name: 알람 체크 및 전송
        run: node alarm.js
        env:
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:       ${{ secrets.VAPID_EMAIL }}
